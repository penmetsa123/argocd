apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mithun-1
  namespace: stg
spec: 
  replicas: 2
  selector:
    matchLabels:
      name: mithun
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      name: mithun-pods
      labels:
        name: mithun
    spec:
      containers:
        - name: mithun-containername
          image: mithuntechnologies/maven-web-application:2
          ports:
            - containerPort: 8080    
