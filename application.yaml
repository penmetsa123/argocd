apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mithun-app
  namespace: argocd   # MUST be argocd namespace
spec:
  project: default

  source:
    repoURL: https://github.com/penmetsa123/argocd.git
    targetRevision: 39097a274c23414244f78289d1e2ad72b72c6a39
    path: demo   # folder where Chart.yaml exists

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
